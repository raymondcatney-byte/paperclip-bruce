# Render Blueprint for Paperclip
services:
  - type: web
    name: paperclip-bruce
    runtime: node
    region: ohio
    plan: free
    buildCommand: |
      npm install -g pnpm
      NODE_ENV=development pnpm install
      pnpm --filter @paperclipai/db exec tsc || true
      cd packages/db && npx drizzle-kit generate
    startCommand: |
      mkdir -p /opt/render/.paperclip/instances/default && echo '{"$meta":{"version":1,"updatedAt":"2026-03-09T00:00:00Z","source":"onboard"},"database":{"mode":"postgres"},"server":{"deploymentMode":"local_trusted","exposure":"private","host":"0.0.0.0","port":10000},"logging":{"mode":"file"}}' > /opt/render/.paperclip/instances/default/config.json && cd packages/db && npx drizzle-kit migrate && cd ../../server && HOST=0.0.0.0 PORT=10000 npx tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: PAPERCLIP_MIGRATION_PROMPT
        value: never
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
      - key: DEPLOYMENT_MODE
        value: local_trusted
    healthCheckPath: /api/health

databases:
  - name: paperclip-db
    databaseName: paperclip
    user: paperclip
    plan: free
    region: ohio
