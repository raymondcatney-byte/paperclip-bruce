services:
  - type: web
    name: paperclip-bruce
    runtime: node
    plan: free
    buildCommand: |
      npm install -g pnpm
      NODE_ENV=development pnpm install
    startCommand: |
      cd packages/db && npx drizzle-kit migrate && cd ../../server && HOST=0.0.0.0 PORT=10000 NODE_ENV=production pnpm exec tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: paperclip-db
    plan: free
