# Render Blueprint for Paperclip with UI
services:
  - type: web
    name: paperclip-bruce
    runtime: node
    region: ohio
    plan: free
    buildCommand: |
      npm install -g pnpm
      NODE_ENV=development pnpm install
      
      # Generate database migrations
      cd packages/db && npx drizzle-kit generate
      
      # Build UI for static serving
      echo "Building UI..."
      cd ../../ui && pnpm install && pnpm run build
      
      # Copy UI dist to server location
      echo "Copying UI to server..."
      mkdir -p ../server/ui-dist
      cp -r dist/* ../server/ui-dist/ || echo "UI build may have failed, continuing..."
      
      echo "Build complete"
    startCommand: |
      cd packages/db && npx drizzle-kit migrate && cd ../../server && HOST=0.0.0.0 PORT=10000 NODE_ENV=production SERVE_UI=true pnpm exec tsx src/index.ts
    envVars:
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: public
      - key: PAPERCLIP_PUBLIC_URL
        value: https://paperclip-bruce.onrender.com
      - key: SERVE_UI
        value: "true"
      - key: BETTER_AUTH_SECRET
        value: paperclip-auth-secret-key-32-chars-long-render
      - key: PAPERCLIP_MIGRATION_PROMPT
        value: never
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: paperclip-db
    databaseName: paperclip
    user: paperclip
    plan: free
    region: ohio
