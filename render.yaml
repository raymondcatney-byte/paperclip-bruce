# Render Blueprint for Paperclip
services:
  - type: web
    name: paperclip-bruce
    runtime: node
    region: ohio
    plan: free
    buildCommand: |
      npm install -g pnpm
      NODE_ENV=development pnpm install
      pnpm --filter @paperclipai/db build || true
      pnpm --filter @paperclipai/server build 2>&1 || echo "Build completed with warnings"
      cd packages/db && npx drizzle-kit generate
    startCommand: |
      export HOST="0.0.0.0"
      export PORT="10000"
      export NODE_ENV="production"
      export PAPERCLIP_MIGRATION_PROMPT="never"
      echo "Starting with HOST=$HOST PORT=$PORT"
      cd packages/db && npx drizzle-kit migrate && cd ../../server && node dist/index.js 2>&1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: PAPERCLIP_MIGRATION_PROMPT
        value: never
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: paperclip-db
    databaseName: paperclip
    user: paperclip
    plan: free
    region: ohio
