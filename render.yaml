# Render Blueprint for Paperclip
services:
  - type: web
    name: paperclip-bruce
    runtime: node
    region: ohio
    plan: free
    buildCommand: |
      npm install -g pnpm
      NODE_ENV=development pnpm install
      pnpm --filter @paperclipai/db exec tsc || true
      cd packages/db && npx drizzle-kit generate
    startCommand: |
      cd packages/db && npx drizzle-kit migrate && cd ../../server && npx tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PAPERCLIP_MIGRATION_PROMPT
        value: never
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
      - key: DEPLOYMENT_MODE
        value: local_trusted
    healthCheckPath: /api/health

databases:
  - name: paperclip-db
    databaseName: paperclip
    user: paperclip
    plan: free
    region: ohio
