# Paperclip - Separate UI and API Services
services:
  # API Service (Node.js)
  - type: web
    name: paperclip-api
    runtime: node
    plan: free
    buildCommand: |
      npm install -g pnpm
      NODE_ENV=development pnpm install
    startCommand: |
      cd packages/db && npx drizzle-kit migrate && cd ../../server && HOST=0.0.0.0 PORT=10000 NODE_ENV=production pnpm exec tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: local_trusted
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
    healthCheckPath: /api/health

  # UI Service (Static Site)
  - type: web
    name: paperclip-ui
    runtime: static
    plan: free
    buildCommand: |
      npm install -g pnpm
      NODE_ENV=development pnpm install
      cd ui && pnpm install && pnpm run build
    staticPublishPath: ./ui/dist
    envVars:
      - key: VITE_API_URL
        value: https://paperclip-api.onrender.com

databases:
  - name: paperclip-db
    plan: free
