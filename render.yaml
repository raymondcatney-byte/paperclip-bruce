# Paperclip Cloud Deployment - Local Trusted Mode (No Auth Required)
services:
  - type: web
    name: paperclip-bruce
    runtime: node
    region: ohio
    plan: free
    buildCommand: |
      npm install -g pnpm
      NODE_ENV=development pnpm install
    startCommand: |
      cd packages/db && npx drizzle-kit migrate && 
      echo "API ready - local_trusted mode (no auth required)" && 
      cd ../../server && 
      HOST=0.0.0.0 PORT=10000 NODE_ENV=production pnpm exec tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: local_trusted
      - key: PAPERCLIP_MIGRATION_PROMPT
        value: never
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: paperclip-db
    databaseName: paperclip
    user: paperclip
    plan: free
    region: ohio
