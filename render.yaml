services:
  - type: web
    name: paperclip-bruce
    runtime: node
    plan: free
    buildCommand: |
      npm install -g pnpm
      pnpm install
      pnpm build
      cd ui && pnpm install && pnpm build
    startCommand: cd server && pnpm exec tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: public
      - key: PAPERCLIP_SERVE_UI
        value: "true"
      - key: PAPERCLIP_PUBLIC_URL
        value: https://paperclip-bruce.onrender.com
      - key: BETTER_AUTH_SECRET
        generateValue: true
    healthCheckPath: /api/health

databases:
  - name: paperclip-db
    plan: free
