# Render Blueprint for Paperclip
services:
  - type: web
    name: paperclip-bruce
    runtime: node
    region: ohio
    plan: free
    buildCommand: |
      npm install -g pnpm
      NODE_ENV=development pnpm install
      cd packages/db && npx drizzle-kit generate
    startCommand: |
      cd server && HOST=0.0.0.0 PORT=10000 NODE_ENV=production pnpm exec tsx src/index.ts
    envVars:
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: public
      - key: PAPERCLIP_PUBLIC_URL
        value: https://paperclip-bruce.onrender.com
      - key: PAPERCLIP_SERVE_UI
        value: "true"
      - key: BETTER_AUTH_SECRET
        value: paperclip-auth-secret-key-32-chars-long-render
      - key: PAPERCLIP_MIGRATION_PROMPT
        value: never
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: paperclip-db
    databaseName: paperclip
    user: paperclip
    plan: free
    region: ohio
